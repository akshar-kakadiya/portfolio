<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="48" height="48" rx="6" fill="#0f172a"/>

  <!--
    CONCEPT 1: AK Fused Monogram
    The A and K share a vertical spine at x=24.
    A's left leg: (8,38) → (24,10)
    A's right leg merges into K's spine: (24,10) → (40,38)
    A's crossbar also acts as K's middle arm: horizontal at y=28
    K's top arm: (24,18) → (40,10)
    All strokes 4px, square caps for pixel precision
  -->

  <!-- A: left diagonal leg -->
  <line x1="9" y1="39" x2="24" y2="10" stroke="#22c55e" stroke-width="4" stroke-linecap="square"/>
  <!-- K: vertical spine (right side of A peak to bottom) -->
  <line x1="24" y1="10" x2="24" y2="39" stroke="#22c55e" stroke-width="4" stroke-linecap="square"/>
  <!-- A crossbar / K middle arm -->
  <line x1="14" y1="28" x2="36" y2="28" stroke="#22c55e" stroke-width="4" stroke-linecap="square"/>
  <!-- K: top diagonal arm -->
  <line x1="24" y1="28" x2="39" y2="10" stroke="#22c55e" stroke-width="4" stroke-linecap="square"/>
  <!-- K: bottom diagonal arm -->
  <line x1="24" y1="28" x2="39" y2="39" stroke="#22c55e" stroke-width="4" stroke-linecap="square"/>
</svg>
