<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="48" height="48" rx="6" fill="#0f172a"/>

  <!--
    CONCEPT 2: Data Node Graph
    A central diamond node with 3 radiating connection lines.
    Represents data science / network thinking.
    Blue accent (#3b82f6) for distinction from Concept 1.
  -->

  <!-- Connection line: center to top -->
  <line x1="24" y1="18" x2="24" y2="7" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="square"/>
  <!-- Connection line: center to bottom-left -->
  <line x1="21" y1="30" x2="12" y2="40" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="square"/>
  <!-- Connection line: center to bottom-right -->
  <line x1="27" y1="30" x2="36" y2="40" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="square"/>

  <!-- Central diamond node -->
  <polygon points="24,14 30,24 24,34 18,24" fill="#3b82f6"/>

  <!-- Satellite nodes -->
  <rect x="21" y="4" width="6" height="6" fill="#3b82f6"/>
  <rect x="9" y="38" width="6" height="6" fill="#3b82f6"/>
  <rect x="33" y="38" width="6" height="6" fill="#3b82f6"/>
</svg>
